name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Run protocol tests
        run: make test

      - name: Build with sanitizers
        run: |
          make clean
          make test CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Wshadow -Wstrict-prototypes -O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all"
